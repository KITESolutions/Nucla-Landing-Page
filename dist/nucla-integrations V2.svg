<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nucla integrations: Nucla CRM, HubSpot, Google Drive, Slack, Microsoft Teams, all connected">
  <defs>
    <style>
      .h { font-family: 'Space Grotesk','Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; }
      .b { font-family: 'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; }
    </style>
  </defs>

  <!-- page -->
  <rect x="0" y="0" width="400" height="400" fill="#FFFFFF"/>
  <!-- card -->
  <rect x="8" y="8" width="384" height="384" rx="22" fill="#FFFFFF" stroke="#EAE7F4" stroke-width="1"/>

  <!-- header -->
  <rect x="28" y="36" width="7" height="20" rx="2.5" fill="#5046E5"/>
  <text x="45" y="52" class="h" font-size="21" font-weight="600" fill="#14112E">Integrations</text>
  <text x="28" y="74" class="b" font-size="11.5" fill="#8B88A0">Your stack, connected to Nucla.</text>
  <line x1="28" y1="92" x2="372" y2="92" stroke="#EDEBF6" stroke-width="1"/>

  <!-- row separators -->
  <line x1="28" y1="156" x2="372" y2="156" stroke="#F1EFF8" stroke-width="1"/>
  <line x1="28" y1="208" x2="372" y2="208" stroke="#F1EFF8" stroke-width="1"/>
  <line x1="28" y1="260" x2="372" y2="260" stroke="#F1EFF8" stroke-width="1"/>
  <line x1="28" y1="312" x2="372" y2="312" stroke="#F1EFF8" stroke-width="1"/>

  <!-- ROW 1: Nucla CRM (center y=130) -->
  <rect x="28" y="113" width="34" height="34" rx="9" fill="#EFEDFD" stroke="#E3DFFB" stroke-width="1"/>
  <text x="45" y="135" class="h" font-size="14" font-weight="600" fill="#5046E5" text-anchor="middle">N</text>
  <text x="76" y="127" class="b" font-size="14" font-weight="600" fill="#14112E">Nucla CRM</text>
  <text x="76" y="142" class="b" font-size="10" fill="#9A97AD">Relationship &amp; deal data</text>
  <rect x="336" y="120" width="36" height="20" rx="10" fill="#34D399"/>
  <circle cx="362" cy="130" r="8" fill="#FFFFFF"/>

  <!-- ROW 2: HubSpot (center y=182) -->
  <rect x="28" y="165" width="34" height="34" rx="9" fill="#EFEDFD" stroke="#E3DFFB" stroke-width="1"/>
  <text x="45" y="187" class="h" font-size="14" font-weight="600" fill="#5046E5" text-anchor="middle">H</text>
  <text x="76" y="179" class="b" font-size="14" font-weight="600" fill="#14112E">HubSpot</text>
  <text x="76" y="194" class="b" font-size="10" fill="#9A97AD">Marketing &amp; sales records</text>
  <rect x="336" y="172" width="36" height="20" rx="10" fill="#34D399"/>
  <circle cx="362" cy="182" r="8" fill="#FFFFFF"/>

  <!-- ROW 3: Google Drive (center y=234) -->
  <rect x="28" y="217" width="34" height="34" rx="9" fill="#EFEDFD" stroke="#E3DFFB" stroke-width="1"/>
  <text x="45" y="239" class="h" font-size="14" font-weight="600" fill="#5046E5" text-anchor="middle">G</text>
  <text x="76" y="231" class="b" font-size="14" font-weight="600" fill="#14112E">Google Drive</text>
  <text x="76" y="246" class="b" font-size="10" fill="#9A97AD">Thesis docs &amp; memos</text>
  <rect x="336" y="224" width="36" height="20" rx="10" fill="#34D399"/>
  <circle cx="362" cy="234" r="8" fill="#FFFFFF"/>

  <!-- ROW 4: Slack (center y=286) -->
  <rect x="28" y="269" width="34" height="34" rx="9" fill="#EFEDFD" stroke="#E3DFFB" stroke-width="1"/>
  <text x="45" y="291" class="h" font-size="14" font-weight="600" fill="#5046E5" text-anchor="middle">S</text>
  <text x="76" y="283" class="b" font-size="14" font-weight="600" fill="#14112E">Slack</text>
  <text x="76" y="298" class="b" font-size="10" fill="#9A97AD">Deal threads &amp; mandates</text>
  <rect x="336" y="276" width="36" height="20" rx="10" fill="#34D399"/>
  <circle cx="362" cy="286" r="8" fill="#FFFFFF"/>

  <!-- ROW 5: Microsoft Teams (center y=338) -->
  <rect x="28" y="321" width="34" height="34" rx="9" fill="#EFEDFD" stroke="#E3DFFB" stroke-width="1"/>
  <text x="45" y="343" class="h" font-size="14" font-weight="600" fill="#5046E5" text-anchor="middle">T</text>
  <text x="76" y="335" class="b" font-size="14" font-weight="600" fill="#14112E">Microsoft Teams</text>
  <text x="76" y="350" class="b" font-size="10" fill="#9A97AD">Channels &amp; meetings</text>
  <rect x="336" y="328" width="36" height="20" rx="10" fill="#34D399"/>
  <circle cx="362" cy="338" r="8" fill="#FFFFFF"/>
</svg>
